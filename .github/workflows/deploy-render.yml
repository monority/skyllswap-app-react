name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-render.yml
  workflow_dispatch: # Permet un déploiement manuel

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Deploy to Render (via webhook)
        if: success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Triggering Render deployment..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Deployment triggered successfully"
          else
            echo "Warning: RENDER_DEPLOY_HOOK secret not set"
            echo "To enable automatic deployments:"
            echo "1. Go to your Render dashboard"
            echo "2. Select your service"
            echo "3. Go to Settings > Build & Deploy"
            echo "4. Copy the Deploy Hook URL"
            echo "5. Add it as a secret in GitHub: RENDER_DEPLOY_HOOK"
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment pipeline completed successfully"
          else
            echo "❌ Deployment pipeline failed"
            exit 1
          fi