name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/deploy-vercel.yml
  workflow_dispatch: # Permet un déploiement manuel

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Deploy to Vercel (via CLI)
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "Installing Vercel CLI..."
            npm install --global vercel@latest
            
            echo "Deploying to Vercel..."
            vercel deploy --prod --token=$VERCEL_TOKEN --yes
            
            echo "Deployment completed successfully"
          else
            echo "Warning: Vercel secrets not configured"
            echo "To enable automatic deployments:"
            echo "1. Create a Vercel account"
            echo "2. Generate a token at https://vercel.com/account/tokens"
            echo "3. Add secrets to GitHub:"
            echo "   - VERCEL_TOKEN"
            echo "   - VERCEL_ORG_ID"
            echo "   - VERCEL_PROJECT_ID"
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Vercel deployment pipeline completed successfully"
          else
            echo "❌ Vercel deployment pipeline failed"
            exit 1
          fi