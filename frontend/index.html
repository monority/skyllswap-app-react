<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"

    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta property="og:title" content="SkillSwap - Échange tes compétences" />

      property="og:description"
      content="Trouve des personnes proches de chez toi pour échanger vos compétences. Apprends, partage, progresse ensemble."
    />

    <meta property="og:url" content="https://skillswap.app" />
    <meta property="og:image" content="https://skillswap.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkillSwap - Échange tes compétences" />

      name="twitter:description"
      content="Trouve des personnes proches de chez toi pour échanger vos compétences."
    />
    <meta name="twitter:image" content="https://skillswap.app/og-image.svg" />
    <meta name="twitter:site" content="@skillswap" />

    <link rel="canonical" href="https://skillswap.app" />
    <link rel="alternate" type="application/rss+xml" title="SkillSwap" href="/rss.xml" />
    <title>SkillSwap - Échange tes compétences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SkillSwap",
        "description": "Échange tes compétences avec des personnes proches de chez toi. Apprends de nouvelles choses, partage tes savoirs.",
        "url": "https://skillswap.app",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "Any",
        "permissions": "network-connections",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "127"
        },
        "screenshot": "https://skillswap.app/og-image.svg",
        "featureList": [
          "Recherche de compétences",
          "Matching intelligent",
          "Messagerie en temps réel",
          "Profils personnalisables"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SkillSwap",
        "url": "https://skillswap.app",
        "logo": "https://skillswap.app/favicon.svg",
        "sameAs": [
          "https://twitter.com/skillswap"
        ]
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
